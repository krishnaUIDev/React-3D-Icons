name: Publish to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/library/**'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: npm install

      - name: Configure Git & Bump Version Dynamically from NPM
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          LATEST_VERSION=$(npm view r3d-icons version || echo "1.1.0")
          NEXT_VERSION=$(node -e "const [major, minor, patch] = '$LATEST_VERSION'.split('.').map(Number); console.log(\`\${major}.\${minor}.\${patch + 1}\`)")
          echo "Next version will be: $NEXT_VERSION"
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('./packages/library/package.json', 'utf8')); pkg.version = '$NEXT_VERSION'; fs.writeFileSync('./packages/library/package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "NEW_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          git add packages/library/package.json
          git commit -m "chore(release): bump version to v$NEXT_VERSION [skip ci]" || true
          git tag -a "v$NEXT_VERSION" -m "Release v$NEXT_VERSION" || true

      - name: Build Library
        run: npm run build:lib

      - name: Publish Package
        run: npm publish ./packages/library --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Git Changes
        run: |
          git push origin main || true
          git push origin "v$NEW_VERSION" || true
