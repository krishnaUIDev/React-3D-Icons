name: Publish to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/library/**'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: npm install

      - name: Build Library
        run: npm run build:lib

      - name: Publish Package
        run: npm publish ./packages/library --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
